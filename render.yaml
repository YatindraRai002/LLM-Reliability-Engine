services:
  - type: redis
    name: llm-redis
    ipAllowList: [] # keep internal-only
    plan: free

  - type: web
    name: llm-backend
    env: python
    rootDir: backend
    buildCommand: "pip install -r requirements.txt"
    startCommand: "uvicorn api.api:app --host 0.0.0.0 --port $PORT"
    envVars:
      - key: REDIS_URL
        fromService:
          type: redis
          name: llm-redis
          property: connectionString
      - key: GROQ_API_KEY
        sync: false # Must be populated in Render Dashboard

  - type: web
    name: llm-frontend
    env: node
    rootDir: frontend
    buildCommand: "npm ci && npm run build"
    startCommand: "npm start" # Next.js production server
    envVars:
      - key: NEXT_PUBLIC_API_URL
        fromService:
          type: web
          name: llm-backend
          property: url
