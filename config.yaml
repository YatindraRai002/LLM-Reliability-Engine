# config.yaml

models:
  local:
    name: "TinyLlama/TinyLlama-1.1B-Chat-v1.0"
    use_4bit: true
    torch_dtype: "float16"
  groq:
    name: "llama-3.3-70b-versatile"
  nli:
    name: "cross-encoder/nli-deberta-v3-base"
  embedding:
    name: "sentence-transformers/all-MiniLM-L6-v2"

detection:
  weights:
    calibration: 0.20
    semantic_uncertainty: 0.50
    cross_check: 0.30
  thresholds:
    low: 0.42
    medium: 0.68

sampling:
  n_samples: 6
  temperature: 0.8

credentials:
  usernames:
    admin:
      email: admin@example.com
      name: Admin User
      # Hashes generated using stauth.Hasher(['admin_password']).generate()
      password: $2b$12$q7O0g8j3Z/xZzO4Z8x4Bie/H2j2m/V5Z/2Y4P1O2W3F4Y5Z6A7B8C
cookie:
  expiry_days: 1
  key: random_signature_key
  name: dashboard_session
preauthorized:
  emails:
  - admin@example.com

explanation:
  enabled: true
  token_attribution:
    enabled: true
    low_confidence_threshold: 0.5    # flag tokens where prob < mean * this
    mild_threshold: 0.75             # yellow highlight: prob between mean*0.5 and mean*0.75
  sentence_nli:
    enabled: true
    contradiction_label: "CONTRADICTION"
    contradiction_threshold: 0.50    # minimum contradiction score to flag a sentence
  signal_shap:
    enabled: true
  recommendations:
    calibration_dominant_threshold: 0.40   # calibration % above which to fire cal recommendation
    semantic_dominant_threshold: 0.50      # semantic % above which to fire semantic recommendation