A production-grade hallucination detection system that fuses three independent uncertainty signals — **calibration scoring**, **semantic uncertainty**, and **cross-model NLI** — into a calibrated risk score.


1. **Calibration**: Extracts token-level probabilities from a local LLM
2. **Semantic Uncertainty**: Generates multiple responses and clusters them by meaning
3. **Cross-Check**: Compares against a remote oracle via DeBERTa NLI
4. **Aggregation**: Weighted fusion with hard NLI override for contradictions


Enter a question in the text box and click **Analyze**. The system will return a risk score (low / medium / high) with detailed signal breakdowns.

Check the **"Show explanation"** checkbox for token-level attribution and sentence-level contradiction detection.
